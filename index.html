<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VibeCon — Builder Cards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<header class="topbar">
  <div class="brand">VibeCon</div>
  <nav class="tabs">
    <a href="#create" data-tab="create">Create card</a>
    <a href="#collection" data-tab="collection">My collection</a>
  </nav>
  <div class="year-badge">VibeCon '25</div>
</header>

<main id="app"></main>

<template id="view-create">
  <section class="split">
    <div class="form-col">
      <h1 class="display">Build your card</h1>
      <p class="sub">// fill in your details. card generates live.</p>
      <form id="card-form" class="form" autocomplete="off">
        <label class="field">
          <span>Full name</span>
          <input name="name" placeholder="Your name" maxlength="40" />
        </label>
        <label class="field">
          <span>What you're building</span>
          <input name="building" placeholder="Your project" maxlength="60" />
        </label>
        <label class="field">
          <span>One-line pitch</span>
          <textarea name="pitch" placeholder="Your one-line pitch" maxlength="120" rows="2"></textarea>
        </label>
        <div class="row">
          <label class="field">
            <span>Twitter / X</span>
            <input name="twitter" placeholder="Your Twitter" maxlength="30" />
          </label>
          <label class="field">
            <span>LinkedIn</span>
            <input name="linkedin" placeholder="Your LinkedIn" maxlength="80" />
          </label>
        </div>
        <div class="rating-group">
          <label class="field">
            <span>Skill 1 name</span>
            <input name="skill1" placeholder="Debugging" maxlength="20" value="Debugging" />
          </label>
          <label class="field range-field">
            <span>Rating <em class="range-val" id="r1-val">5</em>/10</span>
            <input type="range" name="rating1" min="1" max="10" value="5" />
          </label>
        </div>
        <div class="rating-group">
          <label class="field">
            <span>Skill 2 name</span>
            <input name="skill2" placeholder="Vibecoding" maxlength="20" value="Vibecoding" />
          </label>
          <label class="field range-field">
            <span>Rating <em class="range-val" id="r2-val">5</em>/10</span>
            <input type="range" name="rating2" min="1" max="10" value="5" />
          </label>
        </div>
        <div class="field">
          <span>Your photo</span>
          <div class="avatar-maker">
            <label for="photo-input" class="upload-slot upload-slot-wide" id="upload-slot">
              <div class="upload-placeholder">
                <div class="big">📷</div>
                <div>tap to upload your photo</div>
              </div>
            </label>
            <input type="file" id="photo-input" accept="image/*" capture="user" hidden />
          </div>
          <input type="hidden" name="avatar" value="" />
        </div>
        <button type="submit" class="cta">Save my card + join VibeCon ↗</button>
      </form>
    </div>

    <div class="card-col">
      <div id="card" class="card">
        <div class="card-top">
          <div class="card-logos-row">
            <img src="logo1.jpg" alt="" class="logo" />
            <img src="logo2.jpg" alt="" class="logo" />
          </div>
          <div class="attending">ATTENDING</div>
          <div class="event-tag">#VIBECON26</div>
          <div class="event-date">📅 16 – 17 April 2026</div>
        </div>

        <div class="card-photo-frame">
          <img class="card-avatar" id="card-avatar" alt="" />
        </div>

        <div class="card-bottom">
          <h2 class="card-name" data-field="name">Your name</h2>
          <div class="card-ratings">
            <div class="rating-row">
              <span class="rating-label" data-field="skill1">Debugging</span>
              <div class="rating-dots" data-field="rating1"></div>
            </div>
            <div class="rating-row">
              <span class="rating-label" data-field="skill2">Vibecoding</span>
              <div class="rating-dots" data-field="rating2"></div>
            </div>
          </div>
          <div class="card-socials">
            <div>🔗 <span data-field="twitter">@handle</span></div>
            <div>🔗 <span data-field="linkedin">linkedin</span></div>
          </div>
          <div class="card-bottom-tag">#VIBECON26</div>
        </div>
      </div>

      <div class="card-actions">
        <button class="ghost" id="btn-copy">copy card info</button>
        <button class="ghost" id="btn-download">download card</button>
        <button class="ghost" id="btn-view">view collection</button>
      </div>
    </div>
  </section>
</template>

<template id="view-cardonly">
  <section class="cardonly">
    <p class="sub center">// you scanned a builder card</p>
    <div id="card" class="card">
      <div class="card-top">
        <div class="card-logos-row">
          <img src="logo1.jpg" alt="" class="logo" />
          <img src="logo2.jpg" alt="" class="logo" />
        </div>
        <div class="attending">ATTENDING</div>
        <div class="event-tag">#VIBECON26</div>
        <div class="event-date">📅 16 – 17 April 2026</div>
      </div>

      <div class="card-photo-frame">
        <img class="card-avatar" id="card-avatar" alt="" />
      </div>

      <div class="card-bottom">
        <h2 class="card-name" data-field="name">Your name</h2>
        <div class="card-ratings">
          <div class="rating-row">
            <span class="rating-label" data-field="skill1">Debugging</span>
            <div class="rating-dots" data-field="rating1"></div>
          </div>
          <div class="rating-row">
            <span class="rating-label" data-field="skill2">Vibecoding</span>
            <div class="rating-dots" data-field="rating2"></div>
          </div>
        </div>
        <div class="card-socials">
          <div>🔗 <span data-field="twitter">@handle</span></div>
          <div>🔗 <span data-field="linkedin">linkedin</span></div>
        </div>
        <div class="card-bottom-tag">#VIBECON26</div>
      </div>
    </div>

    <div class="card-actions">
      <button class="cta small" id="btn-download">Download card ↓</button>
    </div>
  </section>
</template>

<template id="view-collection">
  <section class="collection">
    <h1 class="display">My collection</h1>
    <p class="sub">// builders you've met at VibeCon.</p>
    <div id="collection-grid" class="grid"></div>
    <div id="collection-empty" class="empty" hidden>
      no cards yet. scan someone's QR to start collecting.
    </div>
  </section>
</template>

<script src="app.js"></script>
</body>
</html>
